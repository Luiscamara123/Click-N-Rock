<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        
        <div class="registration form">
            <header>Cadastrar-se</header>
            <form action="GET">
                <input type="text" placeholder="Insira seu nome completo">
                <input type="date" placeholder="Digite sua data de nascimento">
                <label for="genero">Genero</label>
                <select name="genero">
                    <option>Masculino</option>
                    <option>Feminino</option>
                    <option>Prefiro não dizer</option>
                </select>
                <input type="number" placeholder="Digite seu CPF">
                <input type="text" placeholder="Insira seu endereço">
                <input type="email" placeholder="Insira seu email">
                <input type="password" placeholder="Crie uma senha">
                <input type="password" placeholder="Confirme sua senha">
                <input type="button" class="button" value="Cadastrar-se">
            </form>
            <div class="signup">
                <span class="signup">Já tem uma conta?
                    <label for="check">Login</label>
                </span>
            </div>
        </div>
    </div>
</body>

</html>
